[colors]
background   = #d1ffffff
background-alt = #f0f4f2
foreground   = #4c4f69
primary      = #40a02b
secondary    = #1e66f5
alert        = #d20f39
disabled     = #9ea1b0
#VERDE background = #d1e8f5e9

[bar/example]
width    = 100%
height   = 29pt
radius   = 12pt
offset-x = 0
offset-y = 0
fixed-center = true
override-redirect = false
wm-restack = i3

background = ${colors.background}
foreground = ${colors.foreground}

line-size    = 2pt
border-size  = 6pt
border-bottom-size = 2
border-color = #00000000

padding-left  = 2
padding-right = 2
module-margin = 1

separator            = |
separator-foreground = ${colors.disabled}

font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "Noto Sans:size=10;2"

modules-left  = xworkspaces-icon
modules-right = pulseaudio memory cpu date ip

cursor-click = pointer
enable-ipc   = true
tray-padding = 0

[module/xworkspaces-icon]
type  = custom/script
exec  = ~/.config/polybar/scripts/workspace-nurture.sh
tail  = true
label = %output%
[module/date]
type     = internal/date
interval = 1
date     = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label    = %date%
label-foreground = ${colors.primary}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix            = "󰕾 "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume  = %percentage%%
label-muted   = mute
label-muted-foreground = ${colors.disabled}

[module/cpu]
type     = internal/cpu
interval = 2
format-prefix            = "󰍛 "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/memory]
type     = internal/memory
interval = 2
format-prefix            = "󰾆 "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/ip]
type     = custom/script
exec     = ip addr show enp6s0 2>/dev/null | grep "inet " | awk '{print $2}' | cut -d/ -f1
interval = 30
label    = %output%
format-prefix            = "󰈀 "
format-prefix-foreground = ${colors.primary}
